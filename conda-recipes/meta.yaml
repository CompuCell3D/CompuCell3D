{% set versions = load_file_data('versions.yaml', from_recipe_dir=True) %}

{% set version = versions.get('version') %}
{% set build_number = versions.get('build_number', 0) %}
{% set numpy_version = versions.get('numpy_version') %}
{% set cc3d_network_solvers_version = versions.get('cc3d_network_solvers_version') %}
{% set cmake_version = versions.get('cmake_version') %}
{% set vtk_version = versions.get('vtk_version') %}
{% set swig_version = versions.get('swig_version') %}
{% set boost_version = versions.get('boost_version') %}
{% set tbb_devel_version = versions.get('tbb_devel_version') %}
{% set ipykernel_version = versions.get('ipykernel_version') %}
{% set notebook_version = versions.get('notebook_version') %}
{% set ipywidgets_version = versions.get('ipywidgets_version') %}
{% set widgetsnbextension_version = versions.get('widgetsnbextension_version') %}
{% set ipyvtklink_version = versions.get('ipyvtklink_version') %}

package:
  name: cc3d
  version: {{ version }}

about:
  home: https://compucell3d.org
  license: MIT
  license_file: ../CompuCell3D/License.txt
  summary: Multiscale multicellular virtual tissue modeling and simulation environment

source:
  path: ../

build:
  number: {{ build_number }}
  ignore_run_exports:
    - tbb

requirements:
  build:
    - {{ compiler('c') }}
    - {{ compiler('cxx') }}
    - {{ openmp }}  # [osx]
    - cmake={{ cmake_version }}
    - swig>={{ swig_version }}
    - python {{ python }}
    - pip>=23.0

  host:
    - python {{ python }}
    - numpy={{ numpy_version }}
    - vtk={{ vtk_version }}
    - eigen>=3.4,<3.5
    - tbb-devel={{ tbb_devel_version }}
    - boost>={{ boost_version }}
    - libboost-python-devel>={{ boost_version }}
    - psutil
    - deprecated

  run:
    - python {{ python }}
    - numpy={{ numpy_version }}
    - vtk={{ vtk_version }}
    - eigen>=3.4,<3.5
    - boost={{ boost_version }}
    - libboost-python-devel>={{ boost_version }}
    - psutil
    - deprecated
    - scipy
    - pandas
    - jinja2
    - lxml
    - cc3d-network-solvers>={{ cc3d_network_solvers_version }}
    - simservice
    - ipykernel{{ ipykernel_version }}
    - notebook{{ notebook_version }}
    - ipywidgets{{ ipywidgets_version }}
    - widgetsnbextension{{ widgetsnbextension_version }}
    - ipyvtklink{{ ipyvtklink_version }}
    - sphinx
    - graphviz

  run_constrained:
    - tbb={{ tbb_devel_version }}
